<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra Yıldız - AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.2); z-index: 2;
      }
      #scanning-overlay img { width: 70%; opacity: 0.5; border: 2px solid white; border-radius: 10px; }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <img src="./IMG_0127.png">
    </div>

    <a-scene 
      id="main-scene"
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; filterMinCF:0.0001; filterBeta: 100;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: true"></a-camera>

      <a-entity id="target-tracker" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="my-model"
          src="#avatarModel" 
          position="0 0 0" 
          scale="0.09 0.09 0.09"
          animation-mixer>
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const trackerEl = document.querySelector('#target-tracker');
      const modelEl = document.querySelector('#my-model');
      let pinned = false;

      trackerEl.addEventListener('targetFound', () => {
        if (pinned) return;

        // Modelin kağıda tam oturması için 1.2 saniye bekle
        setTimeout(() => {
          console.log("Koordinatlar kilitleniyor...");

          // 1. Modelin dünya üzerindeki o anki Matrix (konum/rota/ölçek) verisini dondur
          const finalMatrix = modelEl.object3D.matrixWorld.clone();

          // 2. Modeli tracker'dan ÇIKARMIYORUZ ama MindAR'ın onu güncellemesini engelliyoruz
          // Three.js seviyesinde güncellemeyi kapatıyoruz
          modelEl.object3D.matrixAutoUpdate = false;
          
          // 3. Modeli her zaman görünür olması için zorla (MindAR gizleyemesin)
          modelEl.object3D.visible = true;
          
          // 4. MatrixWorld'ü manuel olarak sabitliyoruz
          modelEl.object3D.matrixWorld.copy(finalMatrix);

          // 5. MindAR'ın "visible" değişimlerini engellemek için fonksiyonu eziyoruz
          const originalVisible = modelEl.object3D.visible;
          Object.defineProperty(modelEl.object3D, 'visible', {
            get: function() { return true; }, // Her zaman true dön
            set: function(v) { /* Hiçbir şey yapma, MindAR false yapamasın */ }
          });

          pinned = true;
          
          // UI temizliği
          const overlay = document.querySelector('#scanning-overlay');
          if(overlay) overlay.style.display = 'none';
          
          console.log("Kilitlendi! Artık ne titrer ne de kaybolur.");
        }, 1200);
      });
    </script>
  </body>
</html>
