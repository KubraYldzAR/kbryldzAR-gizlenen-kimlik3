<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      
      #ui-layer {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 1000;
        pointer-events: none;
      }

      /* Referans Resim (IMG_0127) */
      #scanning-prompt {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 75%;
        opacity: 0.5;
        display: block; /* Başlangıçta görünür */
      }

      /* Orijinal Screenshot Butonu Stili */
      #screenshot-btn {
        display: none; 
        position: absolute;
        bottom: 40px; right: 30px;
        width: 75px; height: 75px;
        border-radius: 50%;
        background-color: white;
        border: 5px solid #ffcc00;
        cursor: pointer;
        pointer-events: auto;
        font-size: 32px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        align-items: center; justify-content: center;
        outline: none;
      }
      #screenshot-btn:active { transform: scale(0.9); }
    </style>
  </head>
  <body>

    <a-scene 
      id="ar-scene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-gltf-model 
          id="model" src="#avatarModel" 
          rotation="0 0 0" position="0 0 0" scale="0.1 0.1 0.1"
          animation-mixer="clip: Animation; loop: repeat">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <div id="ui-layer">
      <div id="scanning-prompt">
        <img src="IMG_0127.png" style="width: 100%; height: auto;">
      </div>

      <button type="button" id="screenshot-btn">📸</button>
    </div>

    <script>
      const screenshotBtn = document.querySelector('#screenshot-btn');
      const scanningPrompt = document.querySelector('#scanning-prompt');
      const targetEntity = document.querySelector('#target');
      const modelEl = document.querySelector("#model");

      // Hedef Resim Algılandığında
      targetEntity.addEventListener("targetFound", () => {
        scanningPrompt.style.display = 'none'; // Referansı gizle
        screenshotBtn.style.display = "flex"; // Fotoğraf çekme butonunu göster
        
        // Animasyon Sıralaması
        modelEl.setAttribute('animation-mixer', 'clip: Animation');
        setTimeout(() => {
          modelEl.setAttribute('animation-mixer', 'clip: Scene');
        }, 150);
      });

      // Hedef Resim Kaybolduğunda
      targetEntity.addEventListener("targetLost", () => {
        scanningPrompt.style.display = 'block'; // Referansı geri getir
        screenshotBtn.style.display = "none";
      });

      // Screenshot Alma
      screenshotBtn.addEventListener('click', () => {
        const sceneEl = document.querySelector('a-scene');
        const canvas = sceneEl.components.screenshot.getCanvas('perspective');
        const dataURL = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.download = `AR_Hatira_${new Date().getTime()}.png`;
        link.href = dataURL;
        link.click();
      });
    </script>
  </body>
</html>
