<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image.prod.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    <style>
      body { margin: 0; overflow: hidden; background: #111; }
      
      /* MindAR kamerasının arkada kalması, butonların önde olması için */
      .mindar-ui-scanning, .mindar-ui-loading { z-index: 500 !important; }
      
      #container {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      /* BUTONLARIN ÖNE ÇIKARILMASI (KRİTİK DÜZELTME) */
      #screenshot-btn {
        display: none; 
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: 75px;
        height: 75px;
        border-radius: 50%;
        background-color: white !important;
        border: 5px solid #ffcc00 !important;
        cursor: pointer;
        z-index: 9999 !important; /* Her şeyin üstünde */
        font-size: 30px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        align-items: center;
        justify-content: center;
      }

      #ar-button {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        background: #ffcc00 !important;
        color: black !important;
        border: none;
        border-radius: 30px;
        font-weight: bold;
        font-size: 16px;
        z-index: 9999 !important;
        cursor: pointer;
      }

      #ar-prompt {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9998;
        display: none;
      }
    </style>
  </head>
  <body>

    <div id="container" mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: #ar-prompt;">
      
      <model-viewer 
        id="model-viewer"
        src="elifiki.glb" 
        ios-src="elifiki.usdz"
        style="width: 100%; height: 100%;"
        camera-controls 
        autoplay 
        animation-name="Animation" 
        loop
        shadow-intensity="1"
        loading="eager" 
        crossorigin="anonymous">

        <button id="ar-button">AR DENEYİMİNE BAŞLA</button>
        <button type="button" id="screenshot-btn">📸</button>

        <div id="ar-prompt">
            <img src="ar_hand_prompt.png" style="width: 100px;">
            <p style="color: white; font-family: sans-serif; text-align: center;">Resmi Tarayın</p>
        </div>

      </model-viewer>  
    </div>

    <script>
      const modelViewer = document.querySelector("#model-viewer");
      const screenshotBtn = document.querySelector("#screenshot-btn");
      const arButton = document.querySelector("#ar-button");
      const container = document.querySelector("#container");

      // AR BUTONUNA BASILDIĞINDA TARAMAYI BAŞLAT
      arButton.addEventListener("click", () => {
        arButton.style.display = "none";
        document.querySelector("#ar-prompt").style.display = "block";
        
        // MindAR'ı başlatıyoruz
        const mindarThree = container.getAttribute("mindar-image");
        // MindAR başlatma tetikleyici
        container.dispatchEvent(new CustomEvent("startMindAR")); 
        
        // Model-viewer'ı AR moduna sokuyoruz
        modelViewer.activateAR();
      });

      // RESİM BULUNDUĞUNDA
      container.addEventListener("targetFound", (event) => {
        document.querySelector("#ar-prompt").style.display = "none";
        screenshotBtn.style.display = "flex";
        startAnim(); // Resim bulunca animasyonu başlat
      });

      container.addEventListener("targetLost", () => {
        screenshotBtn.style.display = "none";
      });

      // FOTOĞRAF ÇEKME (ORİJİNAL)
      screenshotBtn.addEventListener('click', async () => {
        const blob = await modelViewer.toBlob({ idealAspect: true });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `AR_Hatira_${new Date().getTime()}.png`;
        a.click();
        URL.revokeObjectURL(url);
      });

      // ANİMASYON MANTIĞI (ORİJİNAL)
      const startAnim = () => {
        modelViewer.animationName = "Animation";
        modelViewer.play();
        setTimeout(() => {
          if (modelViewer.paused) {
            modelViewer.animationName = "Scene";
            modelViewer.play();
          }
        }, 100);
      };

      modelViewer.addEventListener("load", startAnim);
    </script>
  </body>
</html>
