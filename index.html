<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra Yıldız - AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.2); z-index: 2;
      }
      #scanning-overlay img { width: 70%; opacity: 0.5; border: 2px solid white; border-radius: 10px; }
      #scanning-overlay.hidden { display: none !important; }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <img src="./IMG_0127.png">
    </div>

    <a-scene 
      id="ar-scene"
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; filterMinCF: 0.0001; filterBeta: 1000;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-tracker" mindar-image-target="targetIndex: 0"></a-entity>

      <a-gltf-model 
        id="final-model"
        src="#avatarModel" 
        visible="false"
        scale="0.09 0.09 0.09"
        animation-mixer>
      </a-gltf-model>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const trackerEl = document.querySelector('#target-tracker');
      const modelEl = document.querySelector('#final-model');
      let pinned = false;

      trackerEl.addEventListener('targetFound', event => {
        if (!pinned) {
          console.log("Hedef ilk kez bulundu, çivileme işlemi başlıyor...");
          
          // Modelin o andaki dünya koordinatlarını (world position/rotation) yakalayalım
          // 1 saniye bekliyoruz ki model tam yerine otursun
          setTimeout(() => {
            // Tracker'ın o anki konumunu ve rotasyonunu al
            const worldPos = new THREE.Vector3();
            trackerEl.object3D.getWorldPosition(worldPos);
            
            const worldQuat = new THREE.Quaternion();
            trackerEl.object3D.getWorldQuaternion(worldQuat);

            // Bağımsız modelimizi bu koordinatlara ışınla
            modelEl.object3D.position.copy(worldPos);
            modelEl.object3D.quaternion.copy(worldQuat);
            
            // Modeli görünür yap
            modelEl.setAttribute('visible', 'true');
            
            // AR sistemini durdurmaya gerek yok ama istersen durdurabilirsin. 
            // Model artık tracker'dan bağımsız olduğu için target kaybolsa da o gitmez.
            pinned = true;
            console.log("Model sahneye çivilendi.");
            
            // İstersen artık overlay'i tamamen kaldırabilirsin
            document.querySelector('#scanning-overlay').remove();
          }, 1000);
        }
      });
    </script>

  </body>
</html>
