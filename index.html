<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background-color: #f0f0f0; }

      /* ANA BUTONUN GÖRÜNMESİNİ GARANTİLEYEN CSS */
      #ar-button {
        position: fixed;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        background-color: white;
        border-radius: 30px;
        border: 2px solid #4285f4;
        padding: 15px 25px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: #4285f4;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        z-index: 9999 !important; /* Her şeyin en üstünde olması için */
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      }

      /* DEKLANŞÖR BUTONU */
      #screenshot-btn {
        display: none;
        position: fixed;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background-color: white;
        border: 5px solid rgba(0,0,0,0.1);
        cursor: pointer;
        z-index: 10000;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
      }

      /* REHBER RESİM */
      #guide-overlay {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 70%; opacity: 0.4; pointer-events: none; z-index: 5000; display: none;
      }

      model-viewer { width: 100vw; height: 100vh; }
      #ar-scene { display: none; width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>

    <model-viewer id="main-viewer" src="./elifiki.glb" ios-src="./elifiki.usdz" 
                  auto-rotate camera-controls autoplay shadow-intensity="1">
      
      <button id="ar-button">
          <img src="./ar_icon.png" width="24" height="24" alt="Icon">
          AR DENEYİMİNİ BAŞLAT
      </button>
    </model-viewer>

    <img id="guide-overlay" src="./IMG_0127.png">
    <button type="button" id="screenshot-btn"></button>

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no" 
             embedded renderer="preserveDrawingBuffer: true; alpha: true" vr-mode-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="./elifiki.glb" rotation="90 0 0" position="0 0 0" scale="1 1 1" animation-mixer></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const viewer = document.getElementById('main-viewer');
      const btn = document.getElementById('ar-button');
      const scene = document.getElementById('ar-scene');
      const guide = document.getElementById('guide-overlay');
      const shoot = document.getElementById('screenshot-btn');

      // BUTONA TIKLANDIĞINDA KAMERAYI AÇ
      btn.addEventListener('click', () => {
        viewer.style.display = 'none';
        scene.style.display = 'block';
        guide.style.display = 'block';
        
        // MindAR sistemini zorla başlat
        scene.systems["mindar-image-system"].start();
      });

      // TAKİP DURUMU
      scene.addEventListener("targetFound", () => {
        guide.style.display = 'none';
        shoot.style.display = "block";
      });

      scene.addEventListener("targetLost", () => {
        guide.style.display = 'block';
        shoot.style.display = "none";
      });

      // EKRAN GÖRÜNTÜSÜ AL
      shoot.addEventListener('click', () => {
        const canvas = document.querySelector('canvas');
        const dataURL = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.download = 'ar-hatira.png';
        link.href = dataURL;
        link.click();
      });
    </script>
  </body>
</html>
