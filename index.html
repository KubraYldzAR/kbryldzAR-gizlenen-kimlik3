<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Deneyimi</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        /* Beyaz ekranı önlemek için sahne kapsayıcısı */
        .a-canvas {
            width: 100% !important;
            height: 100% !important;
            top: 0 !important;
            left: 0 !important;
            position: absolute !important;
        }

        #ui-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .instruction-text {
            background: rgba(255, 255, 255, 0.9);
            color: #121212; padding: 12px 24px;
            border-radius: 25px; margin-bottom: 25px;
            font-size: 15px; font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #reference-image {
            width: 65%; max-width: 280px;
            opacity: 0.5; border: 2px dashed #fff;
            border-radius: 15px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="instruction-text">Lütfen Görseli Merkeze Alın</div>
        <img id="reference-image" src="IMG_0127.png">
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiLoading: no; uiScanning: no;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelAsset" src="elifiki.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
            <a-gltf-model 
                src="#modelAsset" 
                position="0 0 0" 
                scale="1 1 1" 
                rotation="0 0 0" 
                animation-mixer>
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const targetEntity = document.querySelector('#target-entity');
            const uiContainer = document.querySelector('#ui-container');

            // Hedef algılandığında UI'ı gizle
            targetEntity.addEventListener("targetFound", () => {
                console.log("Hedef Algılandı!");
                uiContainer.classList.add('hidden');
            });

            // Hedef kaybolunca UI'ı tekrar göster
            targetEntity.addEventListener("targetLost", () => {
                uiContainer.classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
