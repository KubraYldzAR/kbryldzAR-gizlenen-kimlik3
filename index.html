<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AR Experience</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; background: #ffffff; }
      
      /* Orijinal Fotoğraf Butonu */
      #capture-btn {
        position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
        width: 80px; height: 80px; border-radius: 50%; background: white;
        border: 5px solid #ffcc00; cursor: pointer; z-index: 1000; display: none;
      }

      /* Yarı Saydam Referans Resmi (Kullanıcıya Yol Gösteren) */
      #guide-overlay {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 70%; opacity: 0.4; pointer-events: none; z-index: 500; display: none;
        border: 2px dashed white;
      }

      /* Başlangıçtaki "AR ile Görüntüle" Butonu */
      #start-ar-btn {
        position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
        padding: 15px 30px; background: #ffcc00; border: none; border-radius: 25px;
        font-weight: bold; z-index: 1001; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <button id="start-ar-btn">AR ile Görüntüle</button>

    <div id="capture-btn"></div>

    <img id="guide-overlay" src="image.png" alt="Guide">

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, preserveDrawingBuffer: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: true">
      
      <a-assets>
        <a-asset-item id="glbModel" src="./elifiki.glb"></a-asset-item>
        <link id="usdzModel" rel="ar" href="./elifiki.usdz">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model id="ar-model" src="#glbModel" rotation="90 0 0" position="0 0 0" scale="1 1 1" animation-mixer></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.querySelector('#start-ar-btn');
      const captureBtn = document.querySelector('#capture-btn');
      const guide = document.querySelector('#guide-overlay');
      const sceneEl = document.querySelector('a-scene');

      // AR'ı Başlatma ve Kamerayı Açma
      startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none';
        guide.style.display = 'block'; // Rehber resmi göster
        sceneEl.systems["mindar-image-system"].start(); // Kamerayı başlat
      });

      // Resim algılandığında
      sceneEl.addEventListener("targetFound", () => {
        guide.style.display = 'none'; // Rehber resmi gizle
        captureBtn.style.display = 'block'; // Fotoğraf butonunu göster
      });

      // Resim kaybolduğunda
      sceneEl.addEventListener("targetLost", () => {
        guide.style.display = 'block';
        captureBtn.style.display = 'none';
      });

      // SENİN ORİJİNAL FOTOĞRAF AYARLARIN
      captureBtn.addEventListener('click', () => {
        const canvas = document.querySelector('canvas');
        const dataURL = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.download = `AR_Hatira_${Date.now()}.png`;
        link.href = dataURL;
        link.click();
      });
    </script>
  </body>
</html>
