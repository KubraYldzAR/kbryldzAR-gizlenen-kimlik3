<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Deneyim - Sabit Model</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* Referans resminin görünmesi için overlay */
        #scanning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3); z-index: 99;
        }
        #scanning-overlay img {
            width: 60%; opacity: 0.7; border: 3px solid white; border-radius: 15px;
        }
        #info-text {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 10px 20px;
            border-radius: 20px; font-family: sans-serif; z-index: 100;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="scanning-overlay">
        <img src="./IMG_0127.png" alt="Referans Görsel">
    </div>

    <div id="info-text">Resmi tarayın...</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: true"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-entity id="anchor-point"></a-entity>
        </a-entity>

        <a-gltf-model id="fixed-model" src="#avatarModel" 
            scale="0.09 0.09 0.09" visible="false">
        </a-gltf-model>
    </a-scene>

    <script>
        const targetEl = document.querySelector('#target');
        const modelEl = document.querySelector('#fixed-model');
        const overlay = document.querySelector('#scanning-overlay');
        const info = document.querySelector('#info-text');
        let isPinned = false;

        targetEl.addEventListener("targetFound", () => {
            if (isPinned) return;
            
            info.innerText = "Model Yerleştiriliyor...";

            // Hedefin dünya üzerindeki konumunu anlık yakala
            setTimeout(() => {
                const worldPos = new THREE.Vector3();
                const worldQuat = new THREE.Quaternion();
                const anchor = document.querySelector('#anchor-point').object3D;
                
                anchor.getWorldPosition(worldPos);
                anchor.getWorldQuaternion(worldQuat);

                // Modeli görünür yap ve o konuma ışınla
                modelEl.object3D.position.copy(worldPos);
                modelEl.object3D.quaternion.copy(worldQuat);
                modelEl.setAttribute('visible', 'true');

                isPinned = true;
                
                // UI'ları kapat
                overlay.classList.add('hidden');
                info.innerText = "Sabitlendi! Gezebilirsiniz.";
                
                // MindAR'ın takibi durdurması için (Sistemi kapatmıyoruz, sadece objeyi ayırıyoruz)
                console.log("Model dünyaya çivilendi.");
            }, 1000); // 1 saniye sonra sabitle
        });
    </script>
</body>
</html>
