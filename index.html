<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra Yıldız - AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.2); z-index: 2;
      }
      #scanning-overlay img { width: 70%; opacity: 0.5; border: 2px solid white; border-radius: 10px; }
      #scanning-overlay.hidden { display: none !important; }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <img src="./IMG_0127.png">
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; filterMinCF: 0.0001; filterBeta: 1000;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="frozen-model"
          src="#avatarModel" 
          rotation="0 0 0" 
          position="0 0 0.001" 
          scale="0.09 0.09 0.09"
          animation-mixer>
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      AFRAME.registerComponent('snap-to-place', {
        init: function () {
          const el = this.el;
          let isFrozen = false;

          el.addEventListener('targetFound', event => {
            if (!isFrozen) {
              // Hedef bulundu, model tam oturana kadar 1.5 saniye bekleyelim.
              console.log("Hedef bulundu, model yerine oturuyor...");
              
              setTimeout(() => {
                // Modelin hedefe göre olan güncel konum ve rotasyonunu al.
                const currentPosition = el.object3D.position.clone();
                const currentRotation = el.object3D.rotation.clone();

                // MindAR'ın bu objeyi güncellemesini durdur.
                // Artik model 'frozen' durumda ama kamera açık.
                el.setAttribute('mindar-image-target', {autoUpdate: false});
                
                // Kaydettiğimiz değerleri modele geri vererek sabitle.
                el.object3D.position.copy(currentPosition);
                el.object3D.rotation.copy(currentRotation);
                
                isFrozen = true;
                console.log("Model matematiksel olarak sabitlendi ve kamera açık kaldı.");
              }, 1500); // 1.5 saniye bekletmek daha dengeli olur.
            }
          });
        }
      });

      // Sahneye kendi component'imizi ekliyoruz.
      document.querySelector('#target-entity').setAttribute('snap-to-place', '');
    </script>

  </body>
</html>
