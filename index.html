<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Deneyimi</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }

        /* Sade ve şık rehber arayüzü */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .instruction-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 24px;
            border-radius: 20px;
            margin-bottom: 30px;
            color: #1a1a1a;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center;
        }

        /* Yarı saydam referans görseli */
        #reference-image {
            width: 65%;
            max-width: 280px;
            opacity: 0.5;
            border: 2px dashed rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            object-fit: cover;
        }

        /* Hedef bulununca arayüzü gizleyen sınıf */
        .hidden {
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="instruction-box">Lütfen kamerayı hedef görsele hizalayın</div>
        <img id="reference-image" src="IMG_0127.png" alt="Hedef Görsel">
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; autoStart: true;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelAsset" src="elifiki.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
            <a-gltf-model src="#modelAsset" position="0 0 0" scale="1 1 1" rotation="0 0 0" animation-mixer></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const targetEntity = document.querySelector('#target-entity');
            const uiContainer = document.querySelector('#ui-container');

            // Hedef görsel algılandığında (bulunduğunda) referans resmini ve yazıyı yok et
            targetEntity.addEventListener("targetFound", event => {
                uiContainer.classList.add('hidden');
            });

            // Kamera hedefi kaybederse kullanıcının tekrar taraması için geri getir
            targetEntity.addEventListener("targetLost", event => {
                uiContainer.classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
