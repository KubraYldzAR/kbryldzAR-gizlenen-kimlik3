<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra Yıldız - AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.2); z-index: 2;
      }
      #scanning-overlay img { width: 70%; opacity: 0.5; border: 2px solid white; border-radius: 10px; }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <img src="./IMG_0127.png">
    </div>

    <a-scene 
      id="main-scene"
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; filterMinCF:0.0001; filterBeta: 100;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: true"></a-camera>

      <a-entity id="target-tracker" mindar-image-target="targetIndex: 0">
        <a-entity id="placeholder-point"></a-entity>
      </a-entity>

      <a-entity id="world-anchor"></a-entity>
    </a-scene>

    <script>
      const trackerEl = document.querySelector('#target-tracker');
      const anchorEl = document.querySelector('#world-anchor');
      const sceneEl = document.querySelector('a-scene');
      let isPinned = false;

      trackerEl.addEventListener('targetFound', () => {
        if (isPinned) return;

        console.log("Hedef bulundu, titremesiz sabitleme başlıyor...");
        
        // 1 saniye sonra konumu dondur (En net anı yakalamak için)
        setTimeout(() => {
          // 1. Tracker'ın dünyadaki o saniyedeki TAM konumunu ve açısını al
          const worldPos = new THREE.Vector3();
          trackerEl.object3D.getWorldPosition(worldPos);
          
          const worldQuat = new THREE.Quaternion();
          trackerEl.object3D.getWorldQuaternion(worldQuat);

          // 2. Yeni bir model elementi oluştur (Mevcut olanı taşımak yerine yeni oluşturmak daha temizdir)
          const pinnedModel = document.createElement('a-gltf-model');
          pinnedModel.setAttribute('src', '#avatarModel');
          pinnedModel.setAttribute('scale', '0.09 0.09 0.09');
          pinnedModel.setAttribute('animation-mixer', '');
          
          // 3. Modeli tracker'ın değil, doğrudan sahnenin bir parçası yap (Anchor içine ekle)
          anchorEl.appendChild(pinnedModel);

          // 4. Model yüklenince yakaladığımız o sabit dünya koordinatlarına oturt
          pinnedModel.addEventListener('model-loaded', () => {
            pinnedModel.object3D.position.copy(worldPos);
            pinnedModel.object3D.quaternion.copy(worldQuat);
            
            // Artık MindAR bu modeli asla güncelleyemez veya titretmez!
            isPinned = true;
            
            // Tracker'ı ve Overlay'i komple devredışı bırak
            trackerEl.setAttribute('mindar-image-target', 'enabled', false);
            document.querySelector('#scanning-overlay').remove();
            
            console.log("Çivi gibi çakıldı!");
          });
        }, 1000);
      });
    </script>
  </body>
</html>
