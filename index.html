<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
      /* Kamera görüntüsünün görünmesi için arka planı şeffaf yapıyoruz */
      body { margin: 0; overflow: hidden; background: none !important; }
      html, body { height: 100%; width: 100%; }

      /* Giriş Ekranı */
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 2000; color: white; text-align: center;
      }

      #start-btn {
        padding: 20px 40px; background: #ffcc00; border: none;
        border-radius: 40px; font-weight: bold; font-size: 18px;
        cursor: pointer; margin-top: 20px; color: black;
      }

      /* Referans Resim */
      #scanning-prompt {
        display: none; position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%); width: 75%;
        opacity: 0.5; z-index: 1500; pointer-events: none;
      }

      /* Fotoğraf Butonu */
      #screenshot-btn {
        display: none; position: fixed; bottom: 40px; right: 30px;
        width: 75px; height: 75px; border-radius: 50%; background: white;
        border: 5px solid #ffcc00; z-index: 1600; font-size: 32px;
        align-items: center; justify-content: center; outline: none;
        pointer-events: auto;
      }

      /* MindAR'ın kendi yükleme ekranlarını gizle (Çakışma yapmasın) */
      .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h2 style="font-family: sans-serif;">AR Deneyimi</h2>
      <button id="start-btn">KAMERAYI BAŞLAT</button>
    </div>

    <div id="scanning-prompt">
      <img src="IMG_0127.png" style="width: 100%;">
    </div>

    <button type="button" id="screenshot-btn">📸</button>

    <a-scene 
      id="ar-scene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no; uiLoading: no;" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights, preserveDrawingBuffer: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: true">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls-enabled="false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-gltf-model 
          id="model" src="#avatarModel" 
          rotation="0 0 0" position="0 0 0" scale="0.1 0.1 0.1">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('#ar-scene');
      const startBtn = document.querySelector('#start-btn');
      const overlay = document.querySelector('#overlay');
      const scanningPrompt = document.querySelector('#scanning-prompt');
      const screenshotBtn = document.querySelector('#screenshot-btn');
      const targetEntity = document.querySelector('#target');
      const modelEl = document.querySelector("#model");

      startBtn.addEventListener('click', () => {
        // Overlay'i kaldır ve kamerayı başlat
        overlay.style.display = 'none';
        scanningPrompt.style.display = 'block';
        
        // A-Frame sistemini başlat
        sceneEl.systems['mindar-image-system'].start();
      });

      targetEntity.addEventListener("targetFound", () => {
        scanningPrompt.style.display = 'none';
        screenshotBtn.style.display = "flex";
        
        // Animasyon geçişi
        modelEl.setAttribute('animation-mixer', {clip: 'Animation', loop: 'repeat'});
        setTimeout(() => {
          modelEl.setAttribute('animation-mixer', {clip: 'Scene', loop: 'repeat'});
        }, 200);
      });

      targetEntity.addEventListener("targetLost", () => {
        scanningPrompt.style.display = 'block';
        screenshotBtn.style.display = "none";
      });

      // Screenshot (A-Frame Canvas üzerinden)
      screenshotBtn.addEventListener('click', () => {
        const canvas = sceneEl.components.screenshot.getCanvas('perspective');
        const dataURL = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.download = `AR_Hatira.png`;
        link.href = dataURL;
        link.click();
      });
    </script>
  </body>
</html>
