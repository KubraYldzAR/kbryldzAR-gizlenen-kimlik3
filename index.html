<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra Yıldız - AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.2); z-index: 2;
      }
      #scanning-overlay img { width: 70%; opacity: 0.5; border: 2px solid white; border-radius: 10px; }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <img src="./IMG_0127.png">
    </div>

    <a-scene 
      id="main-scene"
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; filterMinCF:0.0001; filterBeta: 100;" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-tracker" mindar-image-target="targetIndex: 0">
        <a-entity id="placeholder"></a-entity>
      </a-entity>

      <a-entity id="fixed-container"></a-entity>
    </a-scene>

    <script>
      const trackerEl = document.querySelector('#target-tracker');
      const fixedContainer = document.querySelector('#fixed-container');
      const sceneEl = document.querySelector('a-scene');
      let pinned = false;

      trackerEl.addEventListener('targetFound', () => {
        if (pinned) return;
        
        console.log("Hedef bulundu, model çivileniyor...");

        setTimeout(() => {
          // 1. Tracker'ın dünyadaki tam konumunu ve açısını al
          const worldPos = new THREE.Vector3();
          trackerEl.object3D.getWorldPosition(worldPos);
          
          const worldQuat = new THREE.Quaternion();
          trackerEl.object3D.getWorldQuaternion(worldQuat);

          // 2. Yeni bir model elementi oluştur (Klonlama yerine sıfırdan oluşturma en temizi)
          const finalModel = document.createElement('a-gltf-model');
          finalModel.setAttribute('src', '#avatarModel');
          finalModel.setAttribute('scale', '0.09 0.09 0.09');
          finalModel.setAttribute('animation-mixer', '');
          
          // 3. Modeli sahneye (fixed-container içine) ekle
          fixedContainer.appendChild(finalModel);

          // 4. Model yüklenince dünyadaki sabit koordinatlarına çivile
          finalModel.addEventListener('model-loaded', () => {
            finalModel.object3D.position.copy(worldPos);
            finalModel.object3D.quaternion.copy(worldQuat);
            
            // MindAR'ın bu modeli gizlemesine imkan yok çünkü tracker içinde değil
            pinned = true;
            
            // UI'ı kaldır
            document.querySelector('#scanning-overlay').remove();
            
            // Takipçiyi artık tamamen devredışı bırakabiliriz
            trackerEl.setAttribute('mindar-image-target', 'enabled', false);
            
            console.log("Çivileme tamamlandı!");
          });
        }, 1000); // 1 saniye titremenin oturması için ideal
      });
    </script>
  </body>
</html>
