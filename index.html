<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    <style>
      body { margin: 0; overflow: hidden; }
      
      /* BUTONLARI ÖNE ÇIKARAN KATMAN */
      .ui-layer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* Altındaki kamerayı engellemez */
        z-index: 999;
      }

      /* Orijinal Screenshot Butonu */
      #screenshot-btn {
        display: none; 
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background-color: white;
        border: 5px solid #ffcc00;
        cursor: pointer;
        pointer-events: auto; /* Tıklanabilir yap */
        z-index: 1000;
        font-size: 30px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        align-items: center;
        justify-content: center;
      }

      /* Taramayı başlatan ana buton */
      #ar-button {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        background: #ffcc00;
        border: none;
        border-radius: 30px;
        font-weight: bold;
        pointer-events: auto;
        cursor: pointer;
        z-index: 1000;
      }
    </style>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: #ar-prompt;" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-gltf-model 
          id="model"
          src="#avatarModel" 
          rotation="0 0 0" 
          position="0 0 0" 
          scale="0.1 0.1 0.1"
          animation-mixer="clip: Animation; loop: repeat">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <div class="ui-layer">
      <button id="ar-button">AR DENEYİMİNE BAŞLA</button>
      <button type="button" id="screenshot-btn">📸</button>

      <div id="ar-prompt" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">
          <img src="ar_hand_prompt.png" style="width: 100px;">
          <p style="color: white; text-align: center; font-family: sans-serif;">Resmi Tara</p>
      </div>
    </div>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const arButton = document.querySelector('#ar-button');
      const screenshotBtn = document.querySelector('#screenshot-btn');
      const targetEntity = document.querySelector('#target');

      // 1. AR'I BAŞLAT
      arButton.addEventListener('click', () => {
        arButton.style.display = 'none';
        sceneEl.systems['mindar-image-system'].start(); // MindAR kamerasını başlat
      });

      // 2. RESİM BULUNDUĞUNDA BUTONU GÖSTER
      targetEntity.addEventListener("targetFound", event => {
        screenshotBtn.style.display = "flex";
      });

      targetEntity.addEventListener("targetLost", event => {
        screenshotBtn.style.display = "none";
      });

      // 3. EKRAN GÖRÜNTÜSÜ ALMA (A-Frame ile Uyumlu)
      screenshotBtn.addEventListener('click', () => {
        const canvas = sceneEl.components.screenshot.getCanvas('perspective');
        const dataURL = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.download = `AR_Hatira_${new Date().getTime()}.png`;
        link.href = dataURL;
        link.click();
      });
    </script>
  </body>
</html>
