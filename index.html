<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Deneyim</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: transparent; /* Siyahlığı önlemek için */
        }

        /* Kamera görüntüsünün öne gelmesini sağlayan kritik ayar */
        video {
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            z-index: -1; /* Sahnenin arkasında kalmalı */
        }

        #ui-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .instruction-text {
            background: rgba(255, 255, 255, 0.8);
            color: #000; padding: 10px 20px;
            border-radius: 20px; margin-bottom: 20px;
            font-size: 14px; font-weight: bold;
        }

        #reference-image {
            width: 60%; max-width: 250px;
            opacity: 0.5; border: 2px dashed #fff;
            border-radius: 10px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="instruction-text">GÖRSELİ TARAYIN</div>
        <img id="reference-image" src="IMG_0127.png">
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiLoading: no; uiError: no; uiScanning: no;" 
        embedded
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights, preserveDrawingBuffer: true" 
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelAsset" src="elifiki.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
            <a-gltf-model src="#modelAsset" position="0 0 0" scale="1 1 1" animation-mixer></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const targetEntity = document.querySelector('#target-entity');
        const uiContainer = document.querySelector('#ui-container');

        targetEntity.addEventListener("targetFound", () => {
            uiContainer.classList.add('hidden');
        });

        targetEntity.addEventListener("targetLost", () => {
            uiContainer.classList.remove('hidden');
        });

        // iOS Chrome/Safari için otomatik video oynatma zorlaması
        document.addEventListener('click', () => {
            const video = document.querySelector('video');
            if (video) video.play();
        }, { once: true });
    </script>
</body>
</html>
