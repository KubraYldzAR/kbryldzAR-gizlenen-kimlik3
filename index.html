<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kübra Yıldız - AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      
      /* Saf Beyaz ve Gri Minimalist Tasarım */
      #scanning-overlay {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(255, 255, 255, 0.1); 
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        z-index: 2;
      }

      /* Beyaz Bilgi Kutusu - Gri Detaylı */
      .info-card {
        background: #FFFFFF;
        padding: 12px 35px; border-radius: 50px;
        margin-bottom: 30px; 
        border: 1px solid #F0F0F0;
        box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        color: #7A7A7A; /* Yumuşak Gri */
        font-size: 13px; font-weight: 500; letter-spacing: 1px;
        text-transform: uppercase;
      }

      /* Referans Görsel Çerçevesi */
      .image-frame {
        position: relative; width: 260px; height: 260px;
        display: flex; align-items: center; justify-content: center;
      }

      #scanning-overlay img { 
        width: 100%; height: 100%; object-fit: cover;
        opacity: 0.45; border-radius: 16px;
        border: 3px solid white;
        box-shadow: 0 0 0 1px rgba(224, 224, 224, 0.5);
      }

      #scanning-overlay.hidden { display: none !important; }

      .brand-footer {
        position: absolute; bottom: 50px; color: #FFFFFF;
        font-size: 11px; letter-spacing: 4px;
        opacity: 0.7; font-weight: 400;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <div class="info-card">Görseli Odaklayın</div>
      <div class="image-frame">
        <img src="./IMG_0127.png">
      </div>
      <div class="brand-footer"> ⚡️ Powered by Kübra Yıldız</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; filterMinCF: 0.0001; filterBeta: 1000;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="frozen-model"
          src="#avatarModel" 
          rotation="0 0 0" 
          position="0 0 0.001" 
          scale="0.09 0.09 0.09"
          animation-mixer>
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      AFRAME.registerComponent('snap-to-place', {
        init: function () {
          const el = this.el;
          let isFrozen = false;

          el.addEventListener('targetFound', event => {
            if (!isFrozen) {
              setTimeout(() => {
                const currentPosition = el.object3D.position.clone();
                const currentRotation = el.object3D.rotation.clone();

                el.setAttribute('mindar-image-target', {autoUpdate: false});
                
                el.object3D.position.copy(currentPosition);
                el.object3D.rotation.copy(currentRotation);
                
                isFrozen = true;
              }, 1500); 
            }
          });
        }
      });

      document.querySelector('#target-entity').setAttribute('snap-to-place', '');
    </script>

  </body>
</html>
