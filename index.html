<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kübra Yıldız - AR Experience</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; }
      
      /* MindAR Tarama Arayüzü */
      #scanning-overlay {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        position: absolute; inset: 0; background: rgba(255, 255, 255, 0.1); 
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 2;
      }

      .info-card {
        background: #FFFFFF; padding: 12px 35px; border-radius: 50px;
        margin-bottom: 30px; border: 1px solid #F0F0F0;
        box-shadow: 0 8px 25px rgba(0,0,0,0.06); color: #7A7A7A;
        font-size: 13px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
      }

      .image-frame { width: 260px; height: 260px; display: flex; align-items: center; justify-content: center; }
      #scanning-overlay img { width: 100%; height: 100%; object-fit: cover; opacity: 0.45; border-radius: 16px; border: 3px solid white; }

      /* Mod Değiştirme Butonu */
      #switch-btn {
        position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
        background: #FFFFFF; color: #7A7A7A; padding: 15px 35px;
        border-radius: 50px; border: 1px solid #F0F0F0;
        font-size: 12px; font-weight: 600; letter-spacing: 1px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        z-index: 100; display: none; cursor: pointer; text-transform: uppercase;
      }

      /* Model Viewer Konfigürasyonu */
      model-viewer {
        display: none; position: absolute; inset: 0; width: 100%; height: 100%;
        background: #f8f9fa; z-index: 200;
      }

      /* Senin Orijinal AR Butonun */
      #ar-button {
        background-image: url(ar_icon.png);
        background-repeat: no-repeat;
        background-size: 20px 20px;
        background-position: 12px 50%;
        background-color: #fff;
        position: absolute; left: 50%; transform: translateX(-50%);
        bottom: 132px; padding: 0px 16px 0px 40px;
        font-family: Roboto Regular, Helvetica Neue, sans-serif;
        font-size: 14px; color:#4285f4; height: 36px; line-height: 36px;
        border-radius: 18px; border: 1px solid #DADCE0;
      }

      #screenshot-btn {
        display: none; position: absolute; bottom: 40px; right: 30px;
        width: 65px; height: 65px; border-radius: 50%;
        background: white; border: 4px solid #f0f0f0;
        cursor: pointer; z-index: 999; font-size: 24px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        display: none; align-items: center; justify-content: center;
      }

      .brand-footer { position: absolute; bottom: 20px; color: #FFFFFF; font-size: 10px; width: 100%; text-align: center; opacity: 0.5; }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <div class="info-card">Görseli Odaklayın</div>
      <div class="image-frame"><img src="./IMG_0127.png"></div>
      <div class="brand-footer">Powered by Kübra Yıldız</div>
    </div>

    <button id="switch-btn">Serbest Modda Taşı</button>

    <a-scene 
      id="ar-scene"
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" 
      color-space="sRGB" renderer="colorManagement: true" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets><a-asset-item id="avatarModel" src="elifiki.glb"></a-asset-item></a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#avatarModel" position="0 0 0.001" scale="0.09 0.09 0.09" animation-mixer></a-gltf-model>
      </a-entity>
    </a-scene>

    <model-viewer 
      id="mv-element" 
      src="elifiki.glb" 
      ios-src="elifiki.usdz"
      poster="poster.webp"
      ar ar-modes="webxr scene-viewer quick-look" 
      camera-controls shadow-intensity="1"
      autoplay animation-name="Animation"
      ar-placement="floor">
      
      <button slot="ar-button" id="ar-button">
          AR OLARAK GÖRÜNTÜLE
      </button>

      <button type="button" id="screenshot-btn">📸</button>
    </model-viewer>  

    <script>
      const switchBtn = document.getElementById('switch-btn');
      const mv = document.getElementById('mv-element');
      const sceneEl = document.getElementById('ar-scene');
      const screenshotBtn = document.getElementById('screenshot-btn');

      AFRAME.registerComponent('snap-to-place', {
        init: function () {
          const el = this.el;
          el.addEventListener('targetFound', () => {
            switchBtn.style.display = 'block'; 
          });
        }
      });
      document.querySelector('#target-entity').setAttribute('snap-to-place', '');

      switchBtn.addEventListener('click', () => {
        sceneEl.style.display = 'none';
        switchBtn.style.display = 'none';
        mv.style.display = 'block';
        // mv.activateAR(); // İstersen direkt açar, istersen kullanıcı butona basar. 
      });

      screenshotBtn.addEventListener('click', async () => {
        const blob = await mv.toBlob({ idealAspect: true });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `AR_KubraYildiz.png`;
        a.click();
      });

      mv.addEventListener("ar-status", (event) => {
        screenshotBtn.style.display = (event.detail.status === "session-started") ? "flex" : "none";
      });
    </script>
  </body>
</html>
