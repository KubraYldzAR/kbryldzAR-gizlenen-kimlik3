<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Image Tracking</title>

  <!-- A-Frame v1.5.0 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- MindAR v1.2.5 -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    a-scene { width: 100vw !important; height: 100vh !important; }

    #status-overlay {
      position: fixed; top: 16px; left: 50%;
      transform: translateX(-50%); z-index: 9999;
      padding: 8px 20px; border-radius: 20px;
      font-family: sans-serif; font-size: 14px;
      font-weight: bold; pointer-events: none;
      background: rgba(0,0,0,0.6); color: #fff;
    }
    #status-overlay.tracking { background: rgba(255,180,0,0.85); color: #000; }
    #status-overlay.pinned   { background: rgba(0,200,100,0.9);  color: #fff; }

    #ui-overlay {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%); z-index: 9999;
      pointer-events: none; opacity: 0; transition: opacity 0.6s;
    }
    #ui-overlay.visible { opacity: 1; }
    #ui-overlay img { width: 160px; border-radius: 12px; }
  </style>
</head>
<body>

  <div id="status-overlay">Hedef aranıyor...</div>
  <div id="ui-overlay">
    <img src="./IMG_0127.png" alt="UI Overlay" />
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;
      uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="model" src="./elifiki.glb"></a-asset-item>
    </a-assets>

    <!-- Kamera: pin sonrası look-controls açılır -->
    <a-camera id="ar-camera" look-controls="enabled: false" position="0 0 0"></a-camera>

    <!-- MindAR hedef çapası -->
    <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
      <a-entity
        id="ar-model"
        gltf-model="#model"
        position="0 0 0" rotation="0 0 0" scale="1 1 1"
        visible="false" opacity="0.5"
      ></a-entity>
    </a-entity>
  </a-scene>

  <script>
  (function () {
    // ── Durum değişkenleri ────────────────────────────
    let isPinned    = false;
    let stableTimer = null;
    const STABLE_DELAY = 1200; // ms

    // ── DOM referansları ──────────────────────────────
    const statusEl  = document.getElementById('status-overlay');
    const uiOverlay = document.getElementById('ui-overlay');
    const sceneEl   = document.querySelector('a-scene');
    const anchorEl  = document.getElementById('target-anchor');
    const modelEl   = document.getElementById('ar-model');
    const cameraEl  = document.getElementById('ar-camera');

    // ── Yardımcı fonksiyonlar ─────────────────────────
    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className   = cls || '';
    }

    // Anti-Kaybolma: visible setter'ı override et
    function lockVisibility(el) {
      const obj = el.object3D;
      let _visible = true;
      Object.defineProperty(obj, 'visible', {
        get: () => _visible,
        set: (v) => { _visible = isPinned ? true : v; },
        configurable: true,
      });
      obj.visible = true;
    }

    // Modeli dünya koordinatlarında dondur
    function pinModelInWorld() {
      if (isPinned) return;
      isPinned = true;

      const modelObj  = modelEl.object3D;
      const sceneObj  = sceneEl.object3D;

      // 1. Dünya matrisini yakala
      modelObj.updateWorldMatrix(true, true);
      const worldMatrix = modelObj.matrixWorld.clone();

      // 2. Çapadan kopar, sahneye ekle
      anchorEl.object3D.remove(modelObj);
      sceneObj.add(modelObj);

      // 3. Yakalanan matrisi uygula
      modelObj.matrix.copy(worldMatrix);
      modelObj.matrix.decompose(
        modelObj.position, modelObj.quaternion, modelObj.scale
      );

      // 4. Titreme yok: otomatik güncellemeyi kapat
      modelObj.matrixAutoUpdate = false;

      // 5. Görünürlüğü kilitle
      lockVisibility(modelEl);

      // 6. Tam opak yap
      modelEl.setAttribute('opacity', '1.0');
      modelEl.setAttribute('visible', true);

      // 7. Kamera kontrolünü aç
      cameraEl.setAttribute('look-controls', 'enabled: true');

      // 8. UI overlay göster
      uiOverlay.classList.add('visible');

      // 9. HUD güncelle
      setStatus('Model sabitlendi!', 'pinned');
    }

    // ── MindAR Olayları ───────────────────────────────
    anchorEl.addEventListener('targetFound', () => {
      if (isPinned) return;
      setStatus('Hedef bulundu — sabitleniyor...', 'tracking');
      modelEl.setAttribute('visible', true);
      modelEl.setAttribute('opacity', '0.5');

      clearTimeout(stableTimer);
      stableTimer = setTimeout(pinModelInWorld, STABLE_DELAY);
    });

    anchorEl.addEventListener('targetLost', () => {
      if (isPinned) return; // Zaten sabitlendi, yoksay
      clearTimeout(stableTimer);
      modelEl.setAttribute('visible', false);
      setStatus('Hedef aranıyor...');
    });

    // ── Sahne hazır ───────────────────────────────────
    sceneEl.addEventListener('loaded', () => {
      const anchorObj = anchorEl.object3D;
      let _anchorVisible = true;
      Object.defineProperty(anchorObj, 'visible', {
        get: () => _anchorVisible,
        set: (v) => { _anchorVisible = isPinned ? true : v; },
        configurable: true,
      });
    });
  })();
  </script>

</body>
</html>
