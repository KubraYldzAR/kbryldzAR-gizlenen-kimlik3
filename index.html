<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      
      #ui-container {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 9999;
        pointer-events: none;
      }

      /* BAŞLAT BUTONU */
      #ar-start-button {
        position: absolute;
        bottom: 50px; left: 50%;
        transform: translateX(-50%);
        padding: 20px 40px;
        background-color: #ffcc00;
        border: none;
        border-radius: 40px;
        color: black;
        font-weight: bold;
        font-size: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        cursor: pointer;
        pointer-events: auto; /* Tıklamayı aktif eder */
        display: block;
      }

      /* REFERANS RESİM (IMG_0127) */
      #scanning-prompt {
        display: none;
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 70%;
        opacity: 0.5;
        pointer-events: none;
      }

      /* EKRAN GÖRÜNTÜSÜ BUTONU */
      #screenshot-btn {
        display: none; 
        position: absolute;
        bottom: 30px; right: 30px;
        width: 80px; height: 80px;
        border-radius: 50%;
        background-color: white;
        border: 6px solid #ffcc00;
        cursor: pointer;
        pointer-events: auto;
        font-size: 35px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        align-items: center; justify-content: center;
      }
    </style>
  </head>
  <body>

    <a-scene 
      id="ar-scene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-gltf-model 
          id="model"
          src="#avatarModel" 
          rotation="0 0 0" 
          position="0 0 0" 
          scale="0.1 0.1 0.1">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <div id="ui-container">
      <button id="ar-start-button">AR DENEYİMİNE BAŞLA</button>
      
      <div id="scanning-prompt">
          <img src="IMG_0127.png" style="width: 100%;">
      </div>

      <button type="button" id="screenshot-btn">📸</button>
    </div>

    <script>
      const sceneEl = document.querySelector('#ar-scene');
      const startButton = document.querySelector('#ar-start-button');
      const screenshotBtn = document.querySelector('#screenshot-btn');
      const scanningPrompt = document.querySelector('#scanning-prompt');
      const targetEntity = document.querySelector('#target');
      const modelEl = document.querySelector("#model");

      // KAMERAYI BAŞLATMA FONKSİYONU
      startButton.addEventListener('click', () => {
        console.log("Başlatma deneniyor...");
        
        // Kamera sistemini zorla başlat
        const startAR = () => {
            sceneEl.systems['mindar-image-system'].start();
            startButton.style.display = 'none';
            scanningPrompt.style.display = 'block';
        };

        // Eğer sahne yüklendiyse hemen başlat, yüklenmediyse yüklenmesini bekle
        if (sceneEl.hasLoaded) {
            startAR();
        } else {
            sceneEl.addEventListener('loaded', startAR);
        }
      });

      // HEDEF BULUNDUĞUNDA
      targetEntity.addEventListener("targetFound", () => {
        scanningPrompt.style.display = 'none';
        screenshotBtn.style.display = "flex";
        
        // Animasyonları başlat
        modelEl.setAttribute('animation-mixer', 'clip: Animation; loop: repeat');
        setTimeout(() => {
          modelEl.setAttribute('animation-mixer', 'clip: Scene; loop: repeat');
        }, 150);
      });

      // HEDEF KAYBOLDUĞUNDA
      targetEntity.addEventListener("targetLost", () => {
        scanningPrompt.style.display = 'block';
        screenshotBtn.style.display = "none";
      });

      // EKRAN GÖRÜNTÜSÜ
      screenshotBtn.addEventListener('click', () => {
        const canvas = sceneEl.components.screenshot.getCanvas('perspective');
        const dataURL = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.download = `AR_Hatira.png`;
        link.href = dataURL;
        link.click();
      });
    </script>
  </body>
</html>
