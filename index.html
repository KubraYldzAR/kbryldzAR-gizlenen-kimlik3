<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
      
      /* Kullanıcı Arayüzü Katmanı */
      #ui-container {
        position: fixed;
        bottom: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 1000;
        pointer-events: none; /* Altındaki kamerayı engellememesi için */
      }

      /* 1. TALEP: Sayfa Yüklenince Kamerayı Başlatan Ana Buton (Slot stili korundu) */
      #ar-start-button {
        position: absolute;
        bottom: 40px; left: 50%;
        transform: translateX(-50%);
        padding: 16px 30px;
        background-color: #ffcc00; /* Sarı renk korundu */
        border: none;
        border-radius: 30px;
        color: black;
        font-weight: bold;
        font-size: 16px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        cursor: pointer;
        pointer-events: auto; /* Tıklanabilir yap */
        z-index: 1001;
      }

      /* 2. TALEP: Taranacak Dosya Referansı (IMG_0127) */
      #scanning-prompt {
        display: none; /* Başlangıçta gizli */
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 80%;
        height: auto;
        opacity: 0.6; /* Yarı saydam */
        pointer-events: none;
        z-index: 1001;
      }
      #scanning-prompt img {
        width: 100%;
        height: auto;
        display: block;
      }

      /* 3. TALEP: Orijinal Screenshot Butonu Stili (Sarı Çerçeve) */
      #screenshot-btn {
        display: none; /* Sadece resim bulunca gösterilecek */
        position: absolute;
        bottom: 30px; right: 30px;
        width: 70px; height: 70px;
        border-radius: 50%;
        background-color: white;
        border: 5px solid #ffcc00; /* Sarı çerçeve */
        cursor: pointer;
        pointer-events: auto; /* Tıklanabilir yap */
        z-index: 1002;
        font-size: 30px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        align-items: center; justify-content: center;
        outline: none;
      }
      #screenshot-btn:active { transform: scale(0.9); }
    </style>
  </head>
  <body>

    <a-scene 
      id="ar-scene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-gltf-model 
          id="model"
          src="#avatarModel" 
          rotation="0 0 0" 
          position="0 0 0" 
          scale="0.1 0.1 0.1"
          animation-mixer="clip: Animation; loop: repeat">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <div id="ui-container">
      <button id="ar-start-button">AR DENEYİMİNE BAŞLA</button>
      
      <div id="scanning-prompt">
          <img src="IMG_0127.png" alt="Tarama Referansı">
      </div>

      <button type="button" id="screenshot-btn">📸</button>
    </div>

    <script>
      const sceneEl = document.querySelector('#ar-scene');
      const startButton = document.querySelector('#ar-start-button');
      const screenshotBtn = document.querySelector('#screenshot-btn');
      const scanningPrompt = document.querySelector('#scanning-prompt');
      const targetEntity = document.querySelector('#target');

      // 1. AR'I BAŞLAT VE REFERANS RESMİ GÖSTER
      startButton.addEventListener('click', () => {
        startButton.style.display = 'none'; // Başla butonunu gizle
        scanningPrompt.style.display = 'block'; // IMG_0127 referansını göster
        
        // MindAR sistemini başlat
        sceneEl.systems['mindar-image-system'].start();
        console.log("MindAR Kamerasını Açıyor...");
      });

      // 2. RESİM BULUNDUĞUNDA (IMG_0127 yok olur, Model gelir)
      targetEntity.addEventListener("targetFound", event => {
        scanningPrompt.style.display = 'none'; // Referans resmi yok et
        screenshotBtn.style.display = "flex"; // Fotoğraf butonunu göster
        startAnim(); // Animasyonu başlat
      });

      // 3. RESİM KAYBOLDUĞUNDA (Referans geri gelir)
      targetEntity.addEventListener("targetLost", event => {
        scanningPrompt.style.display = 'block'; // Referansı geri getir
        screenshotBtn.style.display = "none"; // Fotoğraf butonunu gizle
      });

      // 4. EKRAN GÖRÜNTÜSÜ ALMA (Orijinal Mantık)
      screenshotBtn.addEventListener('click', () => {
        const scene = document.querySelector('a-scene');
        const canvas = scene.components.screenshot.getCanvas('perspective');
        const dataURL = canvas.toDataURL("image/png");
        
        const link = document.createElement('a');
        link.download = `AR_Hatira_${new Date().getTime()}.png`;
        link.href = dataURL;
        link.click();
      });

      // 5. ANİMASYON MANTIĞI (Orijinal Gecikmeli Geçiş)
      const startAnim = () => {
        const modelEl = document.querySelector("#model");
        modelEl.setAttribute('animation-mixer', 'clip', 'Animation'); // Önce "Animation"
        
        setTimeout(() => {
          modelEl.setAttribute('animation-mixer', 'clip', 'Scene'); // 100ms sonra "Scene"
        }, 100);
      };
    </script>
  </body>
</html>
