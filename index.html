<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #overlay {
        position: absolute; top: 10px; left: 10px; z-index: 100;
        color: white; background: rgba(0,0,0,0.5); padding: 10px;
        font-family: sans-serif; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="overlay">Sistem Başlatılıyor... Lütfen Kamera İzni Verin.</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no" 
             embedded color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="arModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#arModel" 
                      rotation="90 0 0" 
                      position="0 0 0" 
                      scale="1 1 1" 
                      animation-mixer>
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const overlay = document.querySelector('#overlay');
      document.querySelector('a-scene').addEventListener("arReady", (event) => {
        overlay.innerHTML = "Kamerayı Resme Tutun!";
      });
      document.querySelector('a-scene').addEventListener("arError", (event) => {
        overlay.innerHTML = "Hata: Kamera başlatılamadı.";
      });
    </script>
  </body>
</html>
