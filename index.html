<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    a-scene {
      position: fixed;
      width: 100%;
      height: 100%;
    }

    #startUI {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #startBtn {
      padding: 18px 32px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: white;
      color: black;
    }

    #guide {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      z-index: 5;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div id="startUI">
  <button id="startBtn">Start AR</button>
</div>

<img id="guide" src="./IMG_0127.png" />

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets>
    <a-asset-item id="model" src="./elifiki.glb"></a-asset-item>
  </a-assets>

  <a-camera id="camera" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-entity id="modelEntity" gltf-model="#model" scale="0.3 0.3 0.3"></a-entity>
  </a-entity>

</a-scene>

<script>
const sceneEl = document.querySelector("a-scene");
const startBtn = document.getElementById("startBtn");
const startUI = document.getElementById("startUI");

const modelEl = document.getElementById("modelEntity");
const cameraEl = document.getElementById("camera");
const targetEl = document.getElementById("target");

let pinned = false;
let tracking = false;
let timer = null;

// 🔥 START (KESİN ÇALIŞIR)
startBtn.addEventListener("click", async () => {
  startUI.style.display = "none";
  await sceneEl.systems["mindar-image-system"].start();
});

// MODEL → YARI ŞEFFAF
modelEl.addEventListener("model-loaded", () => {
  const mesh = modelEl.getObject3D("mesh");

  mesh.traverse((node) => {
    if (node.material) {
      node.material.transparent = true;
      node.material.opacity = 0.5;
    }
  });
});

// TARGET FOUND
targetEl.addEventListener("targetFound", () => {
  if (pinned) return;

  tracking = true;

  timer = setTimeout(() => {
    if (tracking && !pinned) {
      pinModel();
    }
  }, 1200);
});

// TARGET LOST
targetEl.addEventListener("targetLost", () => {
  tracking = false;

  if (timer) {
    clearTimeout(timer);
    timer = null;
  }
});

// 🔒 PIN LOGIC
function pinModel() {
  pinned = true;

  const obj = modelEl.object3D;

  obj.updateMatrixWorld(true);

  const worldMatrix = obj.matrixWorld.clone();

  obj.matrixAutoUpdate = false;
  obj.matrix.copy(worldMatrix);
  obj.matrix.decompose(obj.position, obj.quaternion, obj.scale);

  // 🚫 KAYBOLMAYI ENGELLE
  Object.defineProperty(obj, "visible", {
    get: () => true,
    set: () => {}
  });

  // FULL OPACITY
  const mesh = modelEl.getObject3D("mesh");
  mesh.traverse((node) => {
    if (node.material) {
      node.material.opacity = 1;
    }
  });

  // 🎥 SERBEST GEZİNME
  cameraEl.setAttribute("look-controls", "enabled: true");

  console.log("Pinned ✅");
}
</script>

</body>
</html>
