<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated AR Fix</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; pointer-events: none; }
        .guide-img { width: 65%; border: 2px solid white; border-radius: 15px; opacity: 0.6; margin-bottom: 20px; }
        .status-pill { background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 50px; font-family: sans-serif; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <img src="./IMG_0127.png" class="guide-img" id="guide">
        <div class="status-pill" id="status">Kamerayı görsele tutun...</div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="animatedModel" src="./elifiki.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: true"></a-camera>

        <a-entity id="target-sensor" mindar-image-target="targetIndex: 0"></a-entity>

        <a-entity id="final-model" 
            gltf-model="#animatedModel" 
            scale="0.09 0.09 0.09" 
            visible="false"
            animation-mixer>
        </a-entity>

    </a-scene>

    <script>
        const sensor = document.querySelector('#target-sensor');
        const model = document.querySelector('#final-model');
        const status = document.querySelector('#status');
        const guide = document.querySelector('#guide');
        let isPinned = false;

        sensor.addEventListener("targetFound", () => {
            if (isPinned) return;
            
            status.innerText = "Hedeflendi! 1 saniye içinde çivilenecek...";
            
            setTimeout(() => {
                if (isPinned) return;

                // 1. Sensörün (takipçinin) o anki konumunu yakala
                const worldPos = new THREE.Vector3();
                const worldQuat = new THREE.Quaternion();
                
                sensor.object3D.getWorldPosition(worldPos);
                sensor.object3D.getWorldQuaternion(worldQuat);

                // 2. Modeli yakalanan koordinatlara taşı
                model.object3D.position.copy(worldPos);
                model.object3D.quaternion.copy(worldQuat);
                
                // 3. Modeli görünür yap
                model.setAttribute('visible', 'true');
                
                // 4. Sabitleme Kilidi
                isPinned = true;
                
                // UI Güncelle
                guide.classList.add('hidden');
                status.innerText = "SABİTLENDİ. Hareket edebilirsiniz!";

                // Animasyonun devam etmesi için matrixAutoUpdate'i kapatmıyoruz,
                // sadece modelin takipçiyle olan hiyerarşik bağını hiç kurmuyoruz.
            }, 1000); 
        });

        // Hedef kaybolduğunda MindAR'ın modeli silme çabasını boşa çıkarıyoruz
        sensor.addEventListener("targetLost", () => {
            if (isPinned) {
                console.log("Hedef kayboldu ama model sabit kalmaya devam ediyor.");
            }
        });
    </script>
</body>
</html>
