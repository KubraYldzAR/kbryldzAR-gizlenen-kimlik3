<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra Yıldız - AR Fix</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* Kameranın görünmesini engelleyebilecek her şeyi şeffaf yapıyoruz */
        a-scene { display: block; width: 100vw; height: 100vh; }
        #info {
            position: absolute; top: 10px; left: 10px; z-index: 999;
            background: rgba(0,0,0,0.6); color: white; padding: 10px;
            font-family: sans-serif; border-radius: 5px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">Kamerayı görsele tutun...</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
        embedded color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: true" wasd-controls-enabled="false"></a-camera>

        <a-entity id="example-target" mindar-image-target="targetIndex: 0">
            <a-gltf-model id="example-model" src="#avatarModel" 
                position="0 0 0" rotation="0 0 0" scale="0.09 0.09 0.09">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const model = document.querySelector('#example-model');
        const target = document.querySelector('#example-target');
        const info = document.querySelector('#info');
        let isPinned = false;

        // Hedef bulunduğunda çalışacak mantık
        target.addEventListener("targetFound", event => {
            if (isPinned) return;
            
            info.innerText = "Hedeflendi! Sabitleniyor...";
            
            setTimeout(() => {
                // Modelin dünyadaki yerini yakala
                const worldPos = new THREE.Vector3();
                model.object3D.getWorldPosition(worldPos);
                
                const worldQuat = new THREE.Quaternion();
                model.object3D.getWorldQuaternion(worldQuat);

                // Modeli takipçiden kopar ve sahneye (evrene) yapıştır
                document.querySelector('a-scene').object3D.add(model.object3D);
                
                // Yakalanan koordinatları modele geri ver
                model.object3D.position.copy(worldPos);
                model.object3D.quaternion.copy(worldQuat);
                
                isPinned = true;
                info.innerText = "Sabitlendi! Artık gezebilirsiniz.";
                
                // MindAR'ın artık bu modeli gizlemesini engellemek için
                model.object3D.visible = true;
            }, 1000);
        });

        // Siyah ekran riskine karşı sahne yüklenince kamerayı dürt
        document.querySelector('a-scene').addEventListener('loaded', () => {
            console.log("Sahne yüklendi, AR başlıyor...");
        });
    </script>
</body>
</html>
