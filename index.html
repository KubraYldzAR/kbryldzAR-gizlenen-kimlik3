<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }

      /* GİRİŞ BUTONU (Mavi İkonlu Görselindeki Tasarım) */
      #ar-button {
        background-color: white;
        border-radius: 25px;
        border: 1px solid #999;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #4285f4;
        font-weight: bold;
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        cursor: pointer;
        z-index: 100;
        white-space: nowrap;
      }

      /* BEYAZ SADE DEKLANŞÖR (Ekran Görüntüsü Butonu) */
      #screenshot-btn {
        display: none;
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: 75px;
        height: 75px;
        border-radius: 50%;
        background-color: white;
        border: 2px solid rgba(0,0,0,0.1);
        cursor: pointer;
        z-index: 2000;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
      }
      #screenshot-btn:active { transform: translateX(-50%) scale(0.9); }

      /* REHBER KATMANI (IMG_0127) */
      #guide-overlay {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 75%; opacity: 0.4; pointer-events: none; z-index: 1500; display: none;
      }

      #ar-scene { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; }
    </style>
  </head>
  <body>

    <model-viewer 
      id="main-viewer"
      src="elifiki.glb" 
      ios-src="elifiki.usdz"
      poster="poster.webp"
      scale="0.1 0.1 0.1" 
      orientation="0deg 90deg 0deg" 
      camera-controls 
      autoplay 
      animation-name="Animation" 
      loop>

      <button slot="ar-button" id="ar-button">
          <img src="ar_icon.png" width="22" height="22" alt="AR Icon">
          AR Denemek İçin Tıkla
      </button>
    </model-viewer>

    <img id="guide-overlay" src="IMG_0127.png">
    <button type="button" id="screenshot-btn"></button>

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no" 
             embedded renderer="preserveDrawingBuffer: true" vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="traceModel" src="elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#traceModel" rotation="90 0 0" position="0 0 0" scale="1 1 1" animation-mixer></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const modelViewer = document.querySelector("#main-viewer");
      const arButton = document.querySelector("#ar-button");
      const arScene = document.querySelector("#ar-scene");
      const guide = document.querySelector("#guide-overlay");
      const screenshotBtn = document.querySelector("#screenshot-btn");

      // AR Takibi Başlat
      arButton.addEventListener('click', () => {
        modelViewer.style.display = 'none';
        arScene.style.display = 'block';
        guide.style.display = 'block';
        arScene.systems["mindar-image-system"].start();
      });

      // Resim Algılandığında / Kaybolduğunda
      arScene.addEventListener("targetFound", () => {
        guide.style.display = 'none';
        screenshotBtn.style.display = "block";
      });

      arScene.addEventListener("targetLost", () => {
        guide.style.display = 'block';
        screenshotBtn.style.display = "none";
      });

      // EKRAN GÖRÜNTÜSÜ ALMA (Yeni sekmede açar, galerine kaydedebilirsin)
      screenshotBtn.addEventListener('click', () => {
        const canvas = document.querySelector('canvas');
        const dataURL = canvas.toDataURL("image/png");
        const newTab = window.open();
        newTab.document.write('<body style="margin:0; background:black; display:flex; align-items:center; justify-content:center;"><img src="' + dataURL + '" style="max-width:100%; height:auto;"></body>');
        newTab.document.title = "AR Hatırası";
      });

      modelViewer.addEventListener("load", () => {
        modelViewer.animationName = "Animation";
        modelViewer.play();
      });
    </script>
  </body>
</html>
