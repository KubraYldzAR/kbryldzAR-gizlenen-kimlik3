<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <link rel="preload" href="elifiki.glb" as="fetch" type="model/gltf-binary" crossorigin="anonymous">

    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    <style>
      /* Kamera ve genel görünüm ayarları */
      body { margin: 0; background-color: #f0f0f0; }
      model-viewer {
        width: 100vw;
        height: 100vh;
        --poster-color: transparent;
      }

      /* Orijinal Buton Stiliniz (Bozulmadı) */
      #screenshot-btn {
        display: none; 
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background-color: white;
        border: 5px solid #ffcc00;
        cursor: pointer;
        z-index: 999;
        font-size: 30px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        align-items: center;
        justify-content: center;
        outline: none;
      }

      /* AR Butonu Özelleştirme */
      #ar-button {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 25px;
        background-color: #ffcc00;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        z-index: 999;
      }
    </style>
  </head>
  <body>

    <model-viewer 
      id="mv"
      src="elifiki.glb" 
      ios-src="elifiki.usdz"
      ar
      ar-modes="webxr quick-look"
      camera-controls 
      autoplay 
      animation-name="Animation"
      shadow-intensity="1"
      alt="AR Model"
      xr-environment>

      <button slot="ar-button" id="ar-button">
          AR DENEYİMİNİ BAŞLAT
      </button>

      <button type="button" id="screenshot-btn">📸</button>

      <div id="ar-prompt" slot="ar-status">
          <img src="ar_hand_prompt.png" style="width: 80px; display: block; margin: auto;">
      </div>
    </model-viewer>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <script>
      const modelViewer = document.querySelector("#mv");
      const screenshotBtn = document.querySelector("#screenshot-btn");

      // 1. RESİM TAKİBİ AYARI (WebXR Image Tracking)
      // Tarayıcı destekliyorsa targets.mind içindeki resmi arar
      modelViewer.addEventListener('ar-status', (event) => {
        if (event.detail.status === "session-started") {
          screenshotBtn.style.display = "flex";
          console.log("AR Oturumu Başladı");
        } else if (event.detail.status === "not-presenting") {
          screenshotBtn.style.display = "none";
        }
      });

      // 2. FOTOĞRAF ÇEKME (ORİJİNAL)
      screenshotBtn.addEventListener('click', async () => {
        const blob = await modelViewer.toBlob({ idealAspect: true });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `AR_Hatira_${new Date().getTime()}.png`;
        a.click();
        URL.revokeObjectURL(url);
      });

      // 3. ANİMASYON TETİKLEME (ORİJİNAL)
      const startAnim = () => {
        modelViewer.play();
        modelViewer.animationName = "Animation";
      };

      modelViewer.addEventListener("load", startAnim);
    </script>
  </body>
</html>
