<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra Yıldız - AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.2); z-index: 2;
      }
      #scanning-overlay img { width: 70%; opacity: 0.5; border: 2px solid white; border-radius: 10px; }
      #scanning-overlay.hidden { display: none !important; }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <img src="./IMG_0127.png">
    </div>

    <a-scene 
      id="ar-scene"
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-tracker" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="temp-model"
          src="#avatarModel" 
          position="0 0 0" 
          scale="0.09 0.09 0.09"
          animation-mixer>
        </a-gltf-model>
      </a-entity>

      <a-entity id="anchor"></a-entity>
    </a-scene>

    <script>
      const trackerEl = document.querySelector('#target-tracker');
      const tempModel = document.querySelector('#temp-model');
      const anchorEl = document.querySelector('#anchor');
      const sceneEl = document.querySelector('a-scene');
      let isPinned = false;

      trackerEl.addEventListener('targetFound', () => {
        if (!isPinned) {
          console.log("Hedef bulundu, çivileme hazırlanıyor...");
          
          // Modelin tam oturması için kısa bir bekleme
          setTimeout(() => {
            // 1. Orijinal modelin dünya konum ve rotasyonunu al
            const worldPos = new THREE.Vector3();
            tempModel.object3D.getWorldPosition(worldPos);
            
            const worldQuat = new THREE.Quaternion();
            tempModel.object3D.getWorldQuaternion(worldQuat);

            // 2. Takipçiyi (MindAR sistemini) tamamen durdur
            // Bu sayede kamera açık kalır ama MindAR artık objeleri gizleyemez
            sceneEl.systems['mindar-image-system'].stop();

            // 3. Modeli sahnedeki sabit 'anchor' entity'sine taşı
            anchorEl.object3D.add(tempModel.object3D);
            
            // 4. Konumları çivile
            tempModel.object3D.position.copy(worldPos);
            tempModel.object3D.quaternion.copy(worldQuat);
            
            isPinned = true;
            
            // UI temizliği
            const overlay = document.querySelector('#scanning-overlay');
            if(overlay) overlay.style.display = 'none';
            
            console.log("Model başarıyla dünyaya çivilendi!");
          }, 800); // 1 saniyeden biraz daha az bekletmek geçişi yumuşatır
        }
      });
    </script>
  </body>
</html>
