<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kübra Yıldız - AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      
      /* Ana Tarama Ekranı Tasarımı */
      #scanning-overlay {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(255, 255, 255, 0.1); /* Beyaz yoğunluk */
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        z-index: 2; transition: opacity 0.5s ease;
      }

      /* Beyaz Bilgi Kutusu */
      .info-card {
        background: rgba(255, 255, 255, 0.95);
        padding: 15px 30px; border-radius: 50px;
        margin-bottom: 40px; border: 1px solid rgba(224, 224, 224, 0.8);
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        color: #4a4a4a; /* Gri detay */
        font-size: 14px; font-weight: 500; letter-spacing: 0.5px;
      }

      /* Referans Görsel Kapsayıcı */
      .image-frame {
        position: relative; width: 280px; height: 280px;
        display: flex; align-items: center; justify-content: center;
      }

      #scanning-overlay img { 
        width: 100%; height: 100%; object-fit: cover;
        opacity: 0.4; border-radius: 20px;
        border: 4px solid white; box-shadow: 0 0 0 1px #e0e0e0;
      }

      /* Hareketli Tarama Çizgisi */
      .scan-line {
        position: absolute; width: 100%; height: 2px;
        background: linear-gradient(to right, transparent, white, transparent);
        box-shadow: 0 0 15px white;
        top: 0; left: 0;
        animation: scanMove 3s infinite ease-in-out;
      }

      @keyframes scanMove {
        0% { top: 0; opacity: 0; }
        50% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }

      #scanning-overlay.hidden { display: none !important; }

      /* Alt Kısım Tasarımı */
      .footer-logo {
        position: absolute; bottom: 40px; color: white;
        text-transform: uppercase; font-size: 12px; letter-spacing: 3px;
        opacity: 0.8; font-weight: 300;
      }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <div class="info-card">Görseli Odaklayın</div>
      <div class="image-frame">
        <div class="scan-line"></div>
        <img src="./IMG_0127.png">
      </div>
      <div class="footer-logo">AR Experience</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; filterMinCF: 0.0001; filterBeta: 1000;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="frozen-model"
          src="#avatarModel" 
          rotation="0 0 0" 
          position="0 0 0.001" 
          scale="0.09 0.09 0.09"
          animation-mixer>
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      // Sizin orijinal JS mantığınız - Hiçbir değişiklik yapılmadı
      AFRAME.registerComponent('snap-to-place', {
        init: function () {
          const el = this.el;
          let isFrozen = false;

          el.addEventListener('targetFound', event => {
            if (!isFrozen) {
              console.log("Hedef bulundu, model yerine oturuyor...");
              
              setTimeout(() => {
                const currentPosition = el.object3D.position.clone();
                const currentRotation = el.object3D.rotation.clone();

                el.setAttribute('mindar-image-target', {autoUpdate: false});
                
                el.object3D.position.copy(currentPosition);
                el.object3D.rotation.copy(currentRotation);
                
                isFrozen = true;
                console.log("Model matematiksel olarak sabitlendi.");
              }, 1500); 
            }
          });
        }
      });

      document.querySelector('#target-entity').setAttribute('snap-to-place', '');
    </script>

  </body>
</html>
