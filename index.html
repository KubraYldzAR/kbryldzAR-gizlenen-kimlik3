<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra Yıldız - AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.2); z-index: 2;
      }
      #scanning-overlay img { width: 70%; opacity: 0.5; border: 2px solid white; border-radius: 10px; }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <img src="./IMG_0127.png">
    </div>

    <a-scene 
      id="main-scene"
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; filterMinCF:0.0001; filterBeta: 100;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: true"></a-camera>

      <a-entity id="target-tracker" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="my-model"
          src="#avatarModel" 
          position="0 0 0" 
          scale="0.09 0.09 0.09"
          animation-mixer>
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const trackerEl = document.querySelector('#target-tracker');
      const modelEl = document.querySelector('#my-model');
      const sceneEl = document.querySelector('a-scene');
      let isPinned = false;

      trackerEl.addEventListener('targetFound', () => {
        if (isPinned) return;
        
        console.log("Hedef bulundu, model çivileniyor...");

        // Modelin yerine tam oturması için 1 saniye bekliyoruz
        setTimeout(() => {
          // 1. Modelin o anki dünya koordinatlarını (world position) al
          const worldPos = new THREE.Vector3();
          modelEl.object3D.getWorldPosition(worldPos);
          
          const worldQuat = new THREE.Quaternion();
          modelEl.object3D.getWorldQuaternion(worldQuat);

          // 2. Modeli tracker'dan sök ve doğrudan sahneye (scene) bağla
          // Bu, MindAR'ın modeli gizlemesine veya titretmesine engel olur
          sceneEl.object3D.add(modelEl.object3D);

          // 3. Modeli az önce kaydettiğimiz koordinatlara geri oturt
          modelEl.object3D.position.copy(worldPos);
          modelEl.object3D.quaternion.copy(worldQuat);
          
          isPinned = true;
          
          // 4. Takipçiyi ve UI'ı tamamen kapat
          trackerEl.setAttribute('mindar-image-target', 'enabled', false);
          const overlay = document.querySelector('#scanning-overlay');
          if(overlay) overlay.remove();
          
          console.log("Çivileme başarılı! Model artık bağımsız.");
        }, 1200); 
      });
    </script>
  </body>
</html>
