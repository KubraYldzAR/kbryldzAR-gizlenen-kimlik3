<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image.prod.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    <style>
      /* Kamera görüntüsünün tam ekran olması için */
      body { margin: 0; overflow: hidden; }
      #container { width: 100vw; height: 100vh; position: relative; }
      
      /* Orijinal buton stiliniz */
      #screenshot-btn {
        display: none; 
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background-color: white;
        border: 5px solid #ffcc00;
        cursor: pointer;
        z-index: 999;
        font-size: 30px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="container" mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #ar-prompt;" medical-mode="false">
      
      <model-viewer 
        id="model-viewer"
        src="elifiki.glb" 
        ios-src="elifiki.usdz"
        style="width: 100%; height: 100%; background: transparent;"
        scale="0.1 0.1 0.1" 
        orientation="0deg 90deg 0deg" 
        ar-modes="webxr"
        camera-controls 
        tone-mapping="neutral" 
        shadow-intensity="1" 
        autoplay 
        animation-name="Animation" 
        loop
        loading="eager" 
        crossorigin="anonymous">

        <button type="button" id="screenshot-btn">📸</button>

        <div id="ar-prompt" slot="ar-button">
            <img src="ar_hand_prompt.png" style="width: 100px;">
            <p style="color: white; font-family: sans-serif;">Hedef Resmi Tarayın</p>
        </div>
      </model-viewer>  
    </div>

    <script>
      const modelViewer = document.querySelector("#model-viewer");
      const screenshotBtn = document.querySelector("#screenshot-btn");
      const container = document.querySelector("#container");

      // RESİM BULUNDUĞUNDA MODELİ GÖSTER VE ANİMASYONU BAŞLAT
      container.addEventListener("targetFound", event => {
        console.log("Hedef bulundu!");
        screenshotBtn.style.display = "flex";
        startAnim();
      });

      container.addEventListener("targetLost", event => {
        screenshotBtn.style.display = "none";
      });

      // 1. FOTOĞRAF ÇEKME FONKSİYONU (ORİJİNAL)
      screenshotBtn.addEventListener('click', async () => {
        const blob = await modelViewer.toBlob({ idealAspect: true });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `AR_Sanat_Hatirasi_${new Date().getTime()}.png`;
        a.click();
        URL.revokeObjectURL(url);
      });

      // 2. ANİMASYON MANTIĞI (ORİJİNAL)
      const startAnim = () => {
        modelViewer.animationName = "Animation";
        modelViewer.play();
        
        setTimeout(() => {
          if (modelViewer.paused || modelViewer.animationName !== "Animation") {
            modelViewer.animationName = "Scene";
            modelViewer.play();
          }
        }, 100);
      };

      // Model yüklendiğinde hazırlık yap
      modelViewer.addEventListener("load", () => {
        console.log("Model yüklendi.");
      });
    </script>
  </body>
</html>
