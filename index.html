<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AR Experience</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: black;
    }

    a-scene {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    #startOverlay {
      position: fixed;
      z-index: 10;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #startButton {
      padding: 16px 28px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: white;
      color: black;
    }

    #guide {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      z-index: 5;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div id="startOverlay">
  <button id="startButton">Start AR</button>
</div>

<img id="guide" src="./IMG_0127.png" />

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets timeout="10000">
    <a-asset-item id="model" src="./elifiki.glb"></a-asset-item>
  </a-assets>

  <a-camera id="camera" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <a-entity
      id="modelEntity"
      gltf-model="#model"
      scale="0.3 0.3 0.3"
      position="0 0 0"
    ></a-entity>

  </a-entity>

</a-scene>

<script>
  const sceneEl = document.querySelector("a-scene");
  const startBtn = document.getElementById("startButton");
  const overlay = document.getElementById("startOverlay");
  const modelEl = document.getElementById("modelEntity");
  const cameraEl = document.getElementById("camera");
  const targetEl = document.querySelector("[mindar-image-target]");

  let pinned = false;
  let tracking = false;
  let timer = null;

  // START AR (CRITICAL FIX)
  startBtn.addEventListener("click", async () => {
    overlay.style.display = "none";
    await sceneEl.systems["mindar-image-system"].start();
  });

  // MODEL LOADED → HALF TRANSPARENT
  modelEl.addEventListener("model-loaded", () => {
    const mesh = modelEl.getObject3D("mesh");

    mesh.traverse((node) => {
      if (node.material) {
        node.material.transparent = true;
        node.material.opacity = 0.5;
      }
    });
  });

  // TARGET FOUND
  targetEl.addEventListener("targetFound", () => {
    if (pinned) return;

    tracking = true;

    timer = setTimeout(() => {
      if (tracking && !pinned) {
        pinModel();
      }
    }, 1200);
  });

  // TARGET LOST
  targetEl.addEventListener("targetLost", () => {
    tracking = false;

    if (timer) {
      clearTimeout(timer);
      timer = null;
    }
  });

  function pinModel() {
    pinned = true;

    const obj = modelEl.object3D;

    obj.updateMatrixWorld(true);

    const worldMatrix = obj.matrixWorld.clone();

    obj.matrixAutoUpdate = false;
    obj.matrix.copy(worldMatrix);
    obj.matrix.decompose(obj.position, obj.quaternion, obj.scale);

    // FORCE VISIBILITY
    Object.defineProperty(obj, "visible", {
      get: () => true,
      set: () => {}
    });

    // FULL OPACITY
    const mesh = modelEl.getObject3D("mesh");
    mesh.traverse((node) => {
      if (node.material) {
        node.material.opacity = 1;
      }
    });

    // ENABLE CAMERA ORBIT
    cameraEl.setAttribute("look-controls", "enabled: true");

    console.log("Pinned ✅");
  }
</script>

</body>
</html>
