<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <link rel="stylesheet" href="styles.css">
    <style>
      body { margin: 0; overflow: hidden; }

      /* Hedef görseli ekranın ortasına yarı saydam yerleştiren stil */
      #scanning-overlay {
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        background: transparent;
        z-index: 2;
      }
      #scanning-overlay img {
        width: 60%; /* Görselin ekrandaki büyüklüğü */
        opacity: 0.5; /* Yarı saydamlık */
      }
      /* Hedef bulunduğunda MindAR otomatik olarak 'hidden' class'ı ekler */
      #scanning-overlay.hidden {
        display: none;
      }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <img src="./IMG_0127.png" alt="Hedefi Tara">
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          src="#avatarModel" 
          rotation="0 0 0" 
          position="0 0 0" 
          scale="0.05 0.05 0.05">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script src="script.js"></script>
  </body>
</html>
