<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kübra Yıldız AR Deneyimi</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            color: white; font-family: sans-serif;
        }

        /* Modern şık arayüz */
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .instruction-text {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white; padding: 15px 30px;
            border-radius: 30px; margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px; letter-spacing: 1px;
        }

        #reference-image {
            width: 70%; max-width: 300px;
            opacity: 0.4; border: 2px solid #fff;
            border-radius: 15px; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .hidden { opacity: 0 !important; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <p>AR Deneyimi Yükleniyor...</p>
        <small style="margin-top: 10px; opacity: 0.6;">Lütfen kamera iznini onaylayın</small>
    </div>

    <div id="ui-container" class="hidden">
        <div class="instruction-text">GÖRSELİ TARAYIN</div>
        <img id="reference-image" src="IMG_0127.png">
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" 
        embedded
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelAsset" src="elifiki.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
            <a-gltf-model src="#modelAsset" position="0 0 0" scale="1 1 1" animation-mixer></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const uiContainer = document.querySelector('#ui-container');
        const loadingScreen = document.querySelector('#loading-screen');
        const targetEntity = document.querySelector('#target-entity');

        // Sayfa yüklendiğinde AR'ı başlat
        window.addEventListener("load", () => {
            // A-Frame hazır olduğunda MindAR'ı manuel tetikle
            if (sceneEl.hasLoaded) {
                startAR();
            } else {
                sceneEl.addEventListener("loaded", startAR);
            }
        });

        function startAR() {
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 
            
            sceneEl.addEventListener("arReady", () => {
                loadingScreen.classList.add('hidden');
                uiContainer.classList.remove('hidden');
            });

            sceneEl.addEventListener("arError", () => {
                alert("Kamera başlatılamadı. Lütfen HTTPS bağlantısını ve izinleri kontrol edin.");
            });
        }

        // Görseli görünce UI gizle, kaybedince göster
        targetEntity.addEventListener("targetFound", () => uiContainer.classList.add('hidden'));
        targetEntity.addEventListener("targetLost", () => uiContainer.classList.remove('hidden'));
    </script>
</body>
</html>
