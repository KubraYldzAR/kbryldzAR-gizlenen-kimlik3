<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra Yıldız - AR Experience</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
    
    <style>
      body { margin: 0; overflow: hidden; }

      /* Ekranın ortasındaki yarı saydam rehber görseli */
      #scanning-overlay {
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.2);
        z-index: 2;
      }

      #scanning-overlay img {
        width: 70%;
        opacity: 0.6;
        border: 2px solid rgba(255, 255, 255, 0.5);
        border-radius: 8px;
      }

      /* MindAR hedefi bulduğunda bu ID'ye sahip elementi otomatik gizler */
      #scanning-overlay.hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <img src="./IMG_0127.png" alt="Lütfen Görseli Hizalayın">
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          src="#avatarModel" 
          rotation="0 0 0" 
          position="0 0 0.01" 
          scale="0.10 0.10 0.001"
          animation-mixer="clip: *;">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script src="script.js"></script>
  </body>
</html>
