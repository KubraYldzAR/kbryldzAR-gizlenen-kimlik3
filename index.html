<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra Yıldız - AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.2); z-index: 2;
      }
      #scanning-overlay img { width: 70%; opacity: 0.5; border: 2px solid white; border-radius: 10px; }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <img src="./IMG_0127.png">
    </div>

    <a-scene 
      id="main-scene"
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; filterMinCF:0.0001; filterBeta: 100;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: true"></a-camera>

      <a-entity id="target-tracker" mindar-image-target="targetIndex: 0">
          <a-entity id="marker-point"></a-entity>
      </a-entity>

      <a-gltf-model 
        id="final-model"
        src="#avatarModel" 
        visible="false"
        scale="0.09 0.09 0.09"
        animation-mixer>
      </a-gltf-model>
    </a-scene>

    <script>
      const trackerEl = document.querySelector('#target-tracker');
      const markerPoint = document.querySelector('#marker-point');
      const modelEl = document.querySelector('#final-model');
      let isPinned = false;

      trackerEl.addEventListener('targetFound', () => {
        if (isPinned) return;
        
        console.log("Hedef bulundu, model sabitleniyor...");

        // Modelin hedefe tam oturması için en güvenli bekleme süresi
        setTimeout(() => {
          // 1. Tracker üzerindeki marker'ın dünya koordinatlarını al
          const worldPos = new THREE.Vector3();
          markerPoint.object3D.getWorldPosition(worldPos);
          
          const worldQuat = new THREE.Quaternion();
          markerPoint.object3D.getWorldQuaternion(worldQuat);

          // 2. Sahnede halihazırda bekleyen modeli bu koordinatlara taşı
          modelEl.object3D.position.copy(worldPos);
          modelEl.object3D.quaternion.copy(worldQuat);
          
          // 3. Modeli görünür yap ve animasyonu başlat
          modelEl.setAttribute('visible', 'true');
          
          isPinned = true;
          
          // 4. MindAR'ın bu hedefle işini bitir (Takibi durdur)
          trackerEl.setAttribute('mindar-image-target', 'enabled', false);
          
          // UI temizliği
          document.querySelector('#scanning-overlay').remove();
          
          console.log("Çivileme başarılı!");
        }, 1200); 
      });
    </script>
  </body>
</html>
