<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra Yıldız - AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.1.0/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.2); z-index: 2;
      }
      #scanning-overlay img { width: 70%; opacity: 0.5; border: 2px solid white; border-radius: 10px; }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <img src="./IMG_0127.png">
    </div>

    <a-scene 
      id="main-scene"
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; filterMinCF:0.0001; filterBeta: 100;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./elifiki.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: true"></a-camera>

      <a-entity id="target-tracker" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="my-model"
          src="#avatarModel" 
          position="0 0 0" 
          scale="0.09 0.09 0.09"
          animation-mixer>
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const trackerEl = document.querySelector('#target-tracker');
      const modelEl = document.querySelector('#my-model');
      let isPinned = false;

      // Hedef (Kağıt) ilk bulunduğunda tetiklenir
      trackerEl.addEventListener('targetFound', () => {
        if (isPinned) return;

        console.log("Hedef bulundu, çivileme işlemi başlıyor...");
        
        // Modelin titremesinin geçmesi için 1.5 saniye bekle
        setTimeout(() => {
          // 1. ÖNEMLİ: Takibi durdur (Kağıt hareket etse de model yerinde kalır)
          trackerEl.setAttribute('mindar-image-target', 'autoUpdate', false);
          
          // 2. ÖNEMLİ: Görünürlüğü zorla açık tut
          trackerEl.object3D.visible = true; 

          isPinned = true;
          
          // UI'ı temizle
          const overlay = document.querySelector('#scanning-overlay');
          if(overlay) overlay.style.display = 'none';
          
          console.log("Model koordinata çivilendi!");
        }, 1500);
      });

      // MindAR kağıdı görmeyi bıraktığında tetiklenir
      trackerEl.addEventListener('targetLost', () => {
        if (isPinned) {
          // Kağıt kaybolsa bile modelin görünür kalmasını sağlayan KRİTİK satır:
          trackerEl.object3D.visible = true; 
          console.log("Hedef kayboldu ama model hala sahnede!");
        }
      });
    </script>
  </body>
</html>
